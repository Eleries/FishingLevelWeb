    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropArea = document.getElementById('drop-area');
            const fileInput = document.getElementById('file-input');
            const uploadSection = document.getElementById('upload-section');
            const actionSection = document.getElementById('action-section');
            const modifyBtn = document.getElementById('modify-btn');
            const restoreBtn = document.getElementById('restore-btn');
            const downloadSection = document.getElementById('download-section');
            const downloadBtn = document.getElementById('download-btn');
            const downloadBtnText = document.getElementById('download-btn-text');
            const statusMessage = document.getElementById('status-message');
            const messageText = document.getElementById('message-text');
            const fileInfo = document.getElementById('file-info');
            const fileName = document.getElementById('file-name');
            const fileSize = document.getElementById('file-size');
            const uploadTime = document.getElementById('upload-time');
            const fileType = document.getElementById('file-type');
            const logArea = document.getElementById('log-area'); 

            function updateWindowHeight() {
                const windowHeight = window.innerHeight + 'px';
                document.documentElement.style.setProperty(
                    '--window-height', 
                    windowHeight
                );
                logMessage(`更新窗口高度为: ${windowHeight}`);
            }
            
            updateWindowHeight();
            
            window.addEventListener('resize', updateWindowHeight);
            
            window.addEventListener('orientationchange', updateWindowHeight);

            let uploadedFilePath = '';
            let backupFilePath = '';
            let modifiedFilePath = '';
            let isBackupFile = false;
            let isRestoreOperation = false;

            function logMessage(message, type = 'info') {
                if (!logArea) {
                    console.log(`[日志未显示] ${message}`);
                    return;
                }
                
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('p');
                logEntry.className = type === 'error' ? 'text-red-400' : 'text-gray-300';
                logEntry.innerHTML = `<span class="text-gray-500">[${timestamp}]</span> ${message}`;
                logArea.appendChild(logEntry);
                logArea.scrollTop = logArea.scrollHeight;
            }

            function showStatus(message, type = 'info') {
                const statusMessage = document.getElementById('status-message');
                const messageText = document.getElementById('message-text');
                statusMessage.classList.remove('bg-green-100', 'bg-red-100', 'bg-yellow-100');
                statusMessage.classList.remove('text-green-700', 'text-red-700', 'text-yellow-700');
                if (type === 'success') {
                    statusMessage.classList.add('bg-green-100', 'text-green-700');
                } else if (type === 'error') {
                    statusMessage.classList.add('bg-red-100', 'text-red-700');
                } else if (type === 'warning') {
                    statusMessage.classList.add('bg-yellow-100', 'text-yellow-700');
                } else {
                    statusMessage.classList.add('bg-green-100', 'text-green-700');
                }

                messageText.textContent = message;
                statusMessage.style.opacity = '1';
                setTimeout(() => {
                    statusMessage.style.opacity = '0';
                }, 5000);
            }

function handleFileUpload(file) {
    if (!file) {
        showStatus('请选择文件', 'error');
        logMessage('请选择文件', 'error');
        return;
    }

    fileName.textContent = file.name;
    fileSize.textContent = formatFileSize(file.size);
    uploadTime.textContent = new Date().toLocaleString();
    fileType.textContent = file.type || '未知类型';
    //fileInfo.classList.remove('hidden');

    actionSection.classList.add('hidden');
    downloadSection.classList.add('hidden');
    isRestoreOperation = false;

    const formData = new FormData();
    formData.append('file', file);
    showStatus('正在上传文件...', 'info');
    logMessage(`准备上传文件: ${file.name}`);

    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            showStatus(data.message);
            logMessage(data.message);

            if (data.file_path) {
                uploadedFilePath = data.file_path;
                backupFilePath = '';
                modifiedFilePath = '';
                isBackupFile = uploadedFilePath.includes('_FishBAK');
                actionSection.classList.remove('hidden');
                if (isBackupFile) {
                    modifyBtn.classList.add('hidden');
                    restoreBtn.classList.remove('hidden');
                    logMessage('检测到这是一个备份文件，可以进行还原操作');
                } else {
                    modifyBtn.classList.remove('hidden');
                    restoreBtn.classList.add('hidden');
                    logMessage('可以对这个文件进行修改操作');
                }

                // 显示角色选择
                if (data.names && data.names.length > 0) {
                    const roleSelection = document.getElementById('role-selection');
                    const roleList = document.getElementById('role-list');
                    roleList.innerHTML = '';

                    // 创建房主列
                    const hostDiv = document.createElement('div');
                    hostDiv.className = 'space-y-2';
                    const hostTitle = document.createElement('h4');
                    hostTitle.className = 'font-medium text-gray-700';
                    hostTitle.textContent = '房主';
                    hostDiv.appendChild(hostTitle);

                    // 创建访客列
                    const guestDiv = document.createElement('div');
                    guestDiv.className = 'space-y-2';
                    const guestTitle = document.createElement('h4');
                    guestTitle.className = 'font-medium text-gray-700';
                    guestTitle.textContent = '访客';
                    guestDiv.appendChild(guestTitle);

                    data.names.forEach((name, index) => {
                        const div = document.createElement('div');
                        div.className = 'flex items-center';
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.id = `role-${index}`;
                        checkbox.name = 'selected_roles';
                        checkbox.value = index;
                        if (index === 0) checkbox.checked = true; // 房主默认选中
                        const label = document.createElement('label');
                        label.htmlFor = `role-${index}`;
                        label.className = 'ml-2 text-gray-700';
                        label.textContent = name;

                        div.appendChild(checkbox);
                        div.appendChild(label);

                        if (index === 0) {
                            hostDiv.appendChild(div);
                        } else {
                            guestDiv.appendChild(div);
                        }
                    });

                    roleList.appendChild(hostDiv);
                    roleList.appendChild(guestDiv);
                    roleSelection.classList.remove('hidden');
                }
            } else {
                throw new Error('上传失败，未收到文件路径');
            }
        } else {
            throw new Error('上传失败，未收到服务器响应');
        }
    })
    .catch(error => {
        showStatus(`上传失败: ${error.message}`, 'error');
        logMessage(`上传失败: ${error.message}`, 'error');
    });
}
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            function modifyFile() {
                if (!uploadedFilePath) {
                    showStatus('请先上传文件', 'error');
                    logMessage('请先上传文件', 'error');
                    return;
                }
                showStatus('正在修改文件...', 'info');
                logMessage('开始修改文件...');
                downloadSection.classList.add('hidden');
                isRestoreOperation = false;
                fetch('/modify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `file_path=${encodeURIComponent(uploadedFilePath)}`
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showStatus(data.message);
                        logMessage(data.message);
                        backupFilePath = data.backup_path || '';
                        modifiedFilePath = data.modified_path || '';
                        downloadSection.classList.remove('hidden');
                        downloadBtnText.textContent = '下载修改后的文件';
                    } else {
                        throw new Error('修改失败，未收到服务器响应');
                    }
                })
                .catch(error => {
                    showStatus(`修改失败: ${error.message}`, 'error');
                    logMessage(`修改失败: ${error.message}`, 'error');
                    downloadSection.classList.add('hidden');
                });
            }

            function restoreFile() {
                if (!uploadedFilePath) {
                    showStatus('请先上传文件', 'error');
                    logMessage('请先上传文件', 'error');
                    return;
                }
                showStatus('正在还原文件...', 'info');
                logMessage('开始还原文件...');
                downloadSection.classList.add('hidden');
                isRestoreOperation = true;
                fetch('/restore', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `backup_path=${encodeURIComponent(uploadedFilePath)}`
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showStatus(data.message);
                        logMessage(data.message);
                        modifiedFilePath = data.original_path || '';
                        downloadSection.classList.remove('hidden');
                        downloadBtnText.textContent = '下载还原后的文件';
                    } else {
                        throw new Error('还原失败，未收到服务器响应');
                    }
                })
                .catch(error => {
                    showStatus(`还原失败: ${error.message}`, 'error');
                    logMessage(`还原失败: ${error.message}`, 'error');
                    downloadSection.classList.remove('hidden');
                });
            }
            function downloadFiles() {
                if (!modifiedFilePath) {
                    showStatus('没有可下载的文件', 'error');
                    logMessage('没有可下载的文件', 'error');
                    return;
                }
                
                logMessage('准备下载文件...');
                if (isRestoreOperation) {
                    downloadSingleFile(modifiedFilePath);
                } else {
                    downloadMultipleFiles([modifiedFilePath, backupFilePath]);
                }
            }
            function downloadSingleFile(filePath) {
                if (!filePath) return;
                
                const a = document.createElement('a');
                a.href = `/download?file_path=${encodeURIComponent(filePath)}`;
                a.download = filePath.split('/').pop();
                document.body.appendChild(a);
                const fileName = filePath.split('/').pop();
                logMessage(`开始下载文件: ${fileName}`);         
                a.click();
                document.body.removeChild(a);
                showStatus('文件下载已开始');
            }
            function downloadMultipleFiles(filePaths) {
                const validFilePaths = filePaths.filter(path => path && path.trim() !== '');
                if (validFilePaths.length === 0) {
                    showStatus('没有可下载的文件', 'error');
                    logMessage('没有可下载的文件', 'error');
                    return;
                }
                function downloadNext(i) {
                    if (i >= validFilePaths.length) return;
                    
                    const filePath = validFilePaths[i];
                    const a = document.createElement('a');
                    a.href = `/download?file_path=${encodeURIComponent(filePath)}`;
                    a.download = filePath.split('/').pop();
                    document.body.appendChild(a);
                    const fileName = filePath.split('/').pop();
                    logMessage(`开始下载文件 (${i+1}/${validFilePaths.length}): ${fileName}`);
                    a.click();
                    document.body.removeChild(a);
                    
                    setTimeout(() => downloadNext(i + 1), 1000);
                }
                showStatus(`准备下载 ${validFilePaths.length} 个文件...`);
                downloadNext(0);
            }
            dropArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('border-primary');
                this.classList.add('bg-blue-50');
            });

            dropArea.addEventListener('dragleave', function() {
                this.classList.remove('border-primary');
                this.classList.remove('bg-blue-50');
            });

            dropArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('border-primary');
                this.classList.remove('bg-blue-50');
                
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files[0]);
                }
            });

            modifyBtn.addEventListener('click', function() {
                if (!uploadedFilePath) {
                    showStatus('请先上传文件', 'error');
                    logMessage('请先上传文件', 'error');
                    return;
                }

                const formData = new FormData();
                formData.append('file_path', uploadedFilePath);
                const selected = [];
                document.querySelectorAll('input[name="selected_roles"]:checked').forEach(cb => {
                    selected.push(cb.value);
                });
                if (selected.length === 0) {
                    showStatus('请至少选择一个角色', 'error');
                    logMessage('请至少选择一个角色', 'error');
                    return;
                }
                selected.forEach(idx => formData.append('selected_indices', idx));

                showStatus('正在修改文件...', 'info');
                logMessage('正在修改文件...');

                fetch('/modify', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        showStatus(data.message);
                        logMessage(data.message);

                        if (data.modified_path) {
                            modifiedFilePath = data.modified_path;
                            backupFilePath = data.backup_path;
                            downloadSection.classList.remove('hidden');
                            downloadBtnText.textContent = '下载修改后的文件';
                            logMessage('文件修改完成，可以下载');
                        }
                    } else {
                        throw new Error('修改失败，未收到服务器响应');
                    }
                })
                .catch(error => {
                    showStatus(`修改失败: ${error.message}`, 'error');
                    logMessage(`修改失败: ${error.message}`, 'error');
                });
            });
            restoreBtn.addEventListener('click', restoreFile);
            downloadBtn.addEventListener('click', downloadFiles);

            fileInput.addEventListener('change', function(e) {
                if (this.files && this.files.length > 0) {
                    handleFileUpload(this.files[0]);
                }
            });
            logMessage('应用已启动，等待上传文件...');
        });
    </script>
